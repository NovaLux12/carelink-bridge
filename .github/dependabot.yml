version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
    # Major version bumps need security review before merge.
    # See SECURITY.md for the policy.
    # We do NOT auto-merge Dependabot PRs.